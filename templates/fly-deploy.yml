# Per-repo deploy (applications only) — copy to .github/workflows/fly-deploy.yml.
# Thin caller of the REUSABLE deploy workflow in Cobenian/.github: the
# `workflow_run` trigger + main gate must live here (a repo can't define another
# repo's trigger), but the deploy steps live in the reusable workflow so
# hardening is a one-edit change for every consumer. See STANDARDS.md §4.
name: Fly Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    # Only a *successful* CI run on `main` deploys.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    uses: Cobenian/.github/.github/workflows/fly-deploy.yml@v1
    with:
      head_sha: ${{ github.event.workflow_run.head_sha }}
      app_domain: REPLACE_WITH_APP_DOMAIN # e.g. accounts.cobenian.com
      # ready_path: /readyz               # optional second smoke check (readiness)
      # uses_hex_org_key: true            # set for repos that fetch private Hex deps
    secrets: inherit
