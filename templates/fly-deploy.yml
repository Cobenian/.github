# Per-repo (applications only) — copy to .github/workflows/fly-deploy.yml
# Kept per-repo (not reusable) because the `workflow_run` trigger must live in
# the repo's own workflow, and the app domain differs per repo. See STANDARDS.md §4.
name: Fly Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    # Only a *successful* CI run on `main` deploys.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main'
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha }}   # deploy the exact validated SHA
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Smoke test
        run: |
          sleep 15
          curl -fsS "https://REPLACE_WITH_APP_DOMAIN/health" > /dev/null
